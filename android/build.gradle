buildscript {
  ext.ReactNativeOta = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return ReactNativeOta[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

def otaConfigGeneratorScript = new File(projectDir, "../scripts/generate-ota-config.js")
def generatedOtaAssetsDir = new File(buildDir, "generated/assets/reactNativeOta")
def generatedOtaConfigFile = new File(generatedOtaAssetsDir, "react-native-ota.json")
def otaConfigSearchStart = rootProject.projectDir

def findNearestPackageJson = { File startDir ->
  File currentDir = startDir.canonicalFile

  while (true) {
    File candidate = new File(currentDir, "package.json")

    if (candidate.exists()) {
      return candidate
    }

    File parentDir = currentDir.parentFile

    if (parentDir == null || parentDir == currentDir) {
      return null
    }

    currentDir = parentDir
  }
}

def otaConfigPackageJson = findNearestPackageJson(otaConfigSearchStart)

tasks.register("generateReactNativeOtaConfig", Exec) {
  inputs.file(otaConfigGeneratorScript)
  inputs.property("otaConfigSearchStart", otaConfigSearchStart.absolutePath)
  if (otaConfigPackageJson != null) {
    inputs.file(otaConfigPackageJson)
  } else {
    inputs.property("otaConfigPackageJson", "")
  }
  outputs.file(generatedOtaConfigFile)
  workingDir rootProject.projectDir
  commandLine(
    "node",
    otaConfigGeneratorScript.absolutePath,
    "--search-start",
    otaConfigSearchStart.absolutePath,
    "--output",
    generatedOtaConfigFile.absolutePath
  )

  doFirst {
    generatedOtaAssetsDir.mkdirs()
  }
}

android {
  namespace "com.imcsorin.reactnativeota"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  sourceSets {
    main {
      assets.srcDirs += generatedOtaAssetsDir
    }
  }
}

tasks.named("preBuild").configure {
  dependsOn("generateReactNativeOtaConfig")
}

dependencies {
  implementation "com.facebook.react:react-android"
}
